<!doctype html>
<html><head><meta charset="utf-8"><title>Type · Headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background:#fff; }
  .label { font-family: var(--font-sans); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-3); margin-bottom: 14px; }
  .row { display:flex; align-items:baseline; gap: 16px; margin-bottom: 12px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); white-space:nowrap; }
</style></head>
<body>
  <div class="label">Heading scale</div>
  <div class="row"><h1 style="margin:0; font-weight:400">Markets Outlook</h1><span class="meta">h1 · Zen Serif 48</span></div>
  <div class="row"><h2 style="margin:0; font-family: var(--font-serif); font-weight: 700">Global Equities</h2><span class="meta">h2 · KoPub Batang 32 / 700</span></div>
  <div class="row"><h3 style="margin:0">Sector breakdown</h3><span class="meta">h3 · Pretendard 24 / 600</span></div>
  <div class="row"><h4 style="margin:0">Quarterly review</h4><span class="meta">h4 · Pretendard 20 / 600</span></div>
</body></html>
