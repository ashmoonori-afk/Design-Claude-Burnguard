<!doctype html>
<html><head><meta charset="utf-8"><title>Badges & Tables</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background:#fff; font-family: var(--font-sans); }
  .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-3); margin-bottom: 12px; }
  .row { display:flex; gap: 8px; flex-wrap:wrap; margin-bottom: 16px; }
  .badge { display:inline-flex; align-items:center; gap: 6px; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .b-success { background: var(--green-10); color: var(--green-60); }
  .b-warn { background: var(--yellow-10); color: #70491C; }
  .b-error { background: var(--red-10); color: var(--red-60); }
  .b-info { background: var(--blue-10); color: var(--blue-70); }
  .b-neutral { background: var(--gray-10); color: var(--fg-2); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-weight: 600; color: var(--fg-3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 10px; border-bottom: 1px solid var(--border-strong); }
  td { padding: 10px; border-bottom: 1px solid var(--border); color: var(--fg-1); }
  td.num { font-family: var(--font-mono); text-align: right; }
  .up { color: var(--green-60); }
  .dn { color: var(--red-60); }
</style></head>
<body>
  <div class="label">Badges</div>
  <div class="row">
    <span class="badge b-success">● Active</span>
    <span class="badge b-warn">● Pending</span>
    <span class="badge b-error">● Failed</span>
    <span class="badge b-info">● New</span>
    <span class="badge b-neutral">● Archived</span>
  </div>
  <div class="label">Data table</div>
  <table>
    <thead><tr><th>Symbol</th><th style="text-align:right">Last</th><th style="text-align:right">Δ</th><th style="text-align:right">%</th></tr></thead>
    <tbody>
      <tr><td><b>GS</b> Goldman Sachs</td><td class="num">485.21</td><td class="num up">+11.32</td><td class="num up">+2.39%</td></tr>
      <tr><td><b>JPM</b> JPMorgan</td><td class="num">218.04</td><td class="num up">+1.18</td><td class="num up">+0.54%</td></tr>
      <tr><td><b>MS</b> Morgan Stanley</td><td class="num">112.78</td><td class="num dn">−2.06</td><td class="num dn">−1.79%</td></tr>
    </tbody>
  </table>
</body></html>
