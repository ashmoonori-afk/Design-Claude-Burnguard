<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background:#fff; font-family: var(--font-sans); }
  .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-3); margin-bottom: 14px; }
  .row { display:flex; gap: 12px; align-items:center; margin-bottom: 14px; flex-wrap:wrap; }
  .btn { display:inline-flex; align-items:center; gap: 8px; font-family: var(--font-sans); font-weight: 600; font-size: 14px; padding: 10px 18px; border-radius: 4px; border: 1px solid transparent; cursor: pointer; transition: all 200ms cubic-bezier(0.2,0,0,1); }
  .btn-primary { background: var(--blue-60); color: #fff; }
  .btn-primary:hover { background: var(--blue-70); }
  .btn-secondary { background: #fff; color: var(--fg-1); border-color: var(--border-strong); }
  .btn-secondary:hover { border-color: var(--gray-50); background: var(--gray-10); }
  .btn-tertiary { background: transparent; color: var(--blue-60); padding: 10px 8px; }
  .btn-tertiary:hover { color: var(--blue-70); border-bottom: 1px solid currentColor; border-radius: 0; }
  .btn-dark { background: var(--gray-90); color: #fff; }
  .btn-dark:hover { background: #000; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-lg { padding: 14px 22px; font-size: 16px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-bottom: 6px; }
</style></head>
<body>
  <div class="label">Buttons</div>
  <div class="meta">Variants</div>
  <div class="row">
    <button class="btn btn-primary">Open Account</button>
    <button class="btn btn-secondary">Learn More</button>
    <button class="btn btn-tertiary">View report →</button>
    <button class="btn btn-dark">Sign in</button>
  </div>
  <div class="meta">Sizes</div>
  <div class="row">
    <button class="btn btn-primary btn-sm">Small</button>
    <button class="btn btn-primary">Default</button>
    <button class="btn btn-primary btn-lg">Large</button>
  </div>
</body></html>
