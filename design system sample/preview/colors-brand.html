<!doctype html>
<html><head><meta charset="utf-8"><title>Colors · Brand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background:#fff; font-family: var(--font-sans); }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  .swatch { height: 100px; display:flex; align-items:center; justify-content:center; }
  .meta { padding: 12px 14px; }
  .name { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-1); }
  .role { font-size: 11px; color: var(--fg-3); margin-top: 2px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); margin-top: 6px; }
  .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-3); margin-bottom: 10px; }
</style></head>
<body>
  <div class="label">Brand colors</div>
  <div class="grid">
    <div class="card">
      <div class="swatch" style="background:#7399C6"><span style="font-family:var(--font-display);font-size:42px;font-weight:700;color:#fff">N</span></div>
      <div class="meta"><div class="name">Primary Blue</div><div class="role">Wordmark · brand mark</div><div class="hex">#7399C6</div></div>
    </div>
    <div class="card">
      <div class="swatch" style="background:#186ADE"><span style="font-family:var(--font-sans);font-size:14px;font-weight:600;color:#fff;border-bottom:1px solid #fff">Action link</span></div>
      <div class="meta"><div class="name">Action Blue</div><div class="role">Links · buttons · focus</div><div class="hex">#186ADE</div></div>
    </div>
  </div>
</body></html>
