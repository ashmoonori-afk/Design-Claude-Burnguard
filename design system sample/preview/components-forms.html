<!doctype html>
<html><head><meta charset="utf-8"><title>Forms</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background:#fff; font-family: var(--font-sans); }
  .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-3); margin-bottom: 14px; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .field label { display:block; font-size: 12px; font-weight: 600; color: var(--fg-1); margin-bottom: 6px; }
  .field input, .field select { width: 100%; box-sizing: border-box; font-family: inherit; font-size: 14px; padding: 10px 12px; border: 1px solid var(--border-strong); border-radius: 2px; background: #fff; color: var(--fg-1); transition: border-color 120ms; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--blue-60); box-shadow: 0 0 0 3px var(--focus-ring); }
  .field .hint { font-size: 11px; color: var(--fg-3); margin-top: 4px; }
  .field.error input { border-color: var(--red-60); }
  .field.error .hint { color: var(--red-60); }
  .check { display:flex; align-items:center; gap: 8px; font-size: 13px; color: var(--fg-1); }
</style></head>
<body>
  <div class="label">Form fields</div>
  <div class="grid">
    <div class="field"><label>Email</label><input type="email" value="investor@example.com"><div class="hint">Used for account notifications</div></div>
    <div class="field error"><label>Account number</label><input value="000-12"><div class="hint">Must be 10 digits</div></div>
    <div class="field"><label>Account type</label><select><option>Individual</option><option>Joint</option><option>Trust</option></select></div>
    <div class="field"><label>Allocation</label><input value="$25,000.00" class="numeric"></div>
  </div>
  <div style="margin-top:18px; display:flex; gap:18px;">
    <label class="check"><input type="checkbox" checked> Accredited investor</label>
    <label class="check"><input type="radio" name="r" checked> USD</label>
    <label class="check"><input type="radio" name="r"> EUR</label>
  </div>
</body></html>
