<!doctype html>
<html><head><meta charset="utf-8"><title>Type · Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background:#fff; }
  .label { font-family: var(--font-sans); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-3); margin-bottom: 14px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-top: 4px; }
  .specimen { font-family: var(--font-display); font-weight: 700; line-height: 1.05; letter-spacing: -0.02em; color: var(--fg-1); }
</style></head>
<body>
  <div class="label">Display · Zen Serif (brand)</div>
  <div class="specimen" style="font-size: 80px; font-weight: 400;">Goldman Sachs</div>
  <div class="meta">display-1 · 80 / 88 · Zen Serif Regular · -0.02em</div>
</body></html>
