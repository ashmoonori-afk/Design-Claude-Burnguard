<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { margin: 0; padding: 22px; background:#fff; font-family: var(--font-sans); }
  .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-3); margin-bottom: 14px; }
  .grid { display:grid; grid-template-columns: repeat(8, 1fr); gap: 14px; }
  .ic { display:flex; flex-direction:column; align-items:center; gap: 6px; }
  .ic svg { width: 22px; height: 22px; color: var(--fg-1); stroke-width: 1.5; }
  .nm { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); }
  .note { font-size: 11px; color: var(--fg-3); margin-top: 14px; line-height: 1.5; }
</style></head>
<body>
  <div class="label">Lucide · 1.5 stroke (CDN substitute)</div>
  <div class="grid">
    <div class="ic"><i data-lucide="trending-up"></i><span class="nm">trend-up</span></div>
    <div class="ic"><i data-lucide="trending-down"></i><span class="nm">trend-dn</span></div>
    <div class="ic"><i data-lucide="line-chart"></i><span class="nm">chart</span></div>
    <div class="ic"><i data-lucide="briefcase"></i><span class="nm">portfolio</span></div>
    <div class="ic"><i data-lucide="building-2"></i><span class="nm">firm</span></div>
    <div class="ic"><i data-lucide="globe"></i><span class="nm">global</span></div>
    <div class="ic"><i data-lucide="search"></i><span class="nm">search</span></div>
    <div class="ic"><i data-lucide="user"></i><span class="nm">user</span></div>
    <div class="ic"><i data-lucide="bell"></i><span class="nm">alerts</span></div>
    <div class="ic"><i data-lucide="lock"></i><span class="nm">secure</span></div>
    <div class="ic"><i data-lucide="file-text"></i><span class="nm">report</span></div>
    <div class="ic"><i data-lucide="download"></i><span class="nm">download</span></div>
    <div class="ic"><i data-lucide="arrow-right"></i><span class="nm">next</span></div>
    <div class="ic"><i data-lucide="external-link"></i><span class="nm">external</span></div>
    <div class="ic"><i data-lucide="calendar"></i><span class="nm">date</span></div>
    <div class="ic"><i data-lucide="filter"></i><span class="nm">filter</span></div>
  </div>
  <div class="note">Substitute · The repo ships no icon set. Lucide's 1.5px stroke matches Northvale restraint.</div>
  <script>lucide.createIcons();</script>
</body></html>
