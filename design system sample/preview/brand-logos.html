<!doctype html>
<html><head><meta charset="utf-8"><title>Logos</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background:#fff; font-family: var(--font-sans); }
  .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-3); margin-bottom: 14px; }
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .tile { aspect-ratio: 1.5/1; display:flex; align-items:center; justify-content:center; padding: 18px; border: 1px solid var(--border); border-radius: 4px; }
  .tile img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .tile.dark { background: var(--gray-90); border-color: var(--gray-90); }
  .tile.blue { background: #7399C6; border-color: #7399C6; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-top: 4px; text-align: center; }
</style></head>
<body>
  <div class="label">Logo lockups</div>
  <div class="grid">
    <div><div class="tile"><img src="../assets/logos/Northvale_Signature.svg" alt=""></div><div class="cap">Signature</div></div>
    <div><div class="tile dark"><img src="../assets/logos/Northvale_Signature_Reverse.svg" alt=""></div><div class="cap">Signature Reverse</div></div>
    <div><div class="tile blue"><img src="../assets/logos/Northvale_Reversed.svg" alt=""></div><div class="cap">Reversed on Brand</div></div>
    <div><div class="tile"><img src="../assets/logos/Northvale_Outline.svg" alt=""></div><div class="cap">Outline</div></div>
    <div><div class="tile"><img src="../assets/logos/Northvale_Secondary.svg" alt=""></div><div class="cap">Secondary</div></div>
    <div><div class="tile blue"><img src="../assets/logos/Northvale_Box.svg" alt=""></div><div class="cap">Blue Box</div></div>
  </div>
</body></html>
