<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background:#fff; font-family: var(--font-sans); }
  .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-3); margin-bottom: 14px; }
  .row { display:flex; align-items:center; gap: 16px; margin-bottom: 8px; }
  .key { width: 80px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  .bar { background: var(--blue-60); height: 14px; border-radius: 2px; }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style></head>
<body>
  <div class="label">Spacing scale · 4px grid</div>
  <div class="row"><div class="key">--sp-1</div><div class="bar" style="width:4px"></div><div class="px">4</div></div>
  <div class="row"><div class="key">--sp-2</div><div class="bar" style="width:8px"></div><div class="px">8</div></div>
  <div class="row"><div class="key">--sp-3</div><div class="bar" style="width:12px"></div><div class="px">12</div></div>
  <div class="row"><div class="key">--sp-4</div><div class="bar" style="width:16px"></div><div class="px">16</div></div>
  <div class="row"><div class="key">--sp-6</div><div class="bar" style="width:24px"></div><div class="px">24</div></div>
  <div class="row"><div class="key">--sp-8</div><div class="bar" style="width:32px"></div><div class="px">32</div></div>
  <div class="row"><div class="key">--sp-12</div><div class="bar" style="width:48px"></div><div class="px">48</div></div>
  <div class="row"><div class="key">--sp-16</div><div class="bar" style="width:64px"></div><div class="px">64</div></div>
  <div class="row"><div class="key">--sp-20</div><div class="bar" style="width:80px"></div><div class="px">80</div></div>
</body></html>
